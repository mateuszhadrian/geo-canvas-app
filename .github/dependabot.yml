version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Warsaw'
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns:
          - '@types/*'
          - 'eslint*'
          - 'prettier'
          - 'jest*'
          - '@testing-library/*'
          - '@playwright/*'
          - 'typescript'
        update-types:
          - 'minor'
          - 'patch'
      production-dependencies:
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
          - 'zustand'
          - 'immer'
          - 'konva'
          - 'react-konva'
        update-types:
          - 'patch'
    ignore:
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint-*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'jest'
        update-types: ['version-update:semver-major']
      - dependency-name: 'jest-*'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/jest'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
    labels:
      - 'dependencies'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Warsaw'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
